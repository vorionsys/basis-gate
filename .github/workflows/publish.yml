name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build all workspaces
        run: npm run build

      - name: Publish basis-gate-spec
        run: |
          cd packages/basis-gate-spec
          PKG_NAME=$(node -e "process.stdout.write(require('./package.json').name)")
          PKG_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already on npm, skipping"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish basis-gate-industry
        run: |
          cd packages/basis-gate-industry
          PKG_NAME=$(node -e "process.stdout.write(require('./package.json').name)")
          PKG_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already on npm, skipping"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish basis-gate-runtime
        run: |
          cd packages/basis-gate-runtime
          PKG_NAME=$(node -e "process.stdout.write(require('./package.json').name)")
          PKG_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already on npm, skipping"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
